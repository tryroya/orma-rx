<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Orma Rx — Your CPAP prescription, the easy way</title>
<meta name="description" content="Already had a sleep study? A U.S.-licensed sleep physician reviews your information and, if appropriate, signs your CPAP prescription. $50. Test build.">
<meta name="theme-color" content="#00657C">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2300657C'/%3E%3Ccircle cx='32' cy='32' r='15' fill='none' stroke='%23E2C342' stroke-width='7' stroke-linecap='round' stroke-dasharray='80 15'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#00657C; --gold:#E2C342; --deep:#012733; --cool:#0DA6B2; --lightgold:#F3ED86;
  --ok:#178A4C; --okbg:#E8F6EE; --bad:#C43D3D; --badbg:#FBEDED;
  --ink:#012733; --mut:#4A6A74; --line:#DCE9EC; --bg:#F4F9FA; --card:#FFFFFF;
  --r:18px; --shadow:0 6px 24px rgba(1,39,51,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Poppins',system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.5;min-height:100dvh}
button{font-family:inherit;cursor:pointer;border:0}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink)}
img{max-width:100%}
a{color:var(--teal)}

/* demo ribbon */
.ribbon{position:sticky;top:0;z-index:50;background:var(--deep);color:var(--lightgold);font-size:11.5px;letter-spacing:.02em;text-align:center;padding:6px 12px}
.ribbon b{color:var(--gold);font-weight:600}

/* shells */
.shell{max-width:520px;margin:0 auto;padding:20px 20px calc(110px + env(safe-area-inset-bottom));min-height:70dvh}
.shell.wide{max-width:880px}
.view{animation:fadeUp .28s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* brand */
.brand{display:flex;align-items:center;gap:10px;padding:6px 0 2px}
.brand .oring{width:30px;height:30px;flex:0 0 auto}
.brand .wm{font-weight:700;font-size:21px;color:var(--teal);letter-spacing:.01em}
.brand .wm span{color:var(--mut);font-weight:600}
.brand small{margin-left:auto;color:var(--mut);font-size:12px}

/* landing */
.hero{background:linear-gradient(160deg,#E9F6F7 0%,#F7FBF3 100%);border:1px solid var(--line);border-radius:24px;padding:26px 22px;margin-top:14px;position:relative;overflow:hidden}
.hero .ringbg{position:absolute;right:-40px;top:-40px;width:170px;height:170px;opacity:.5}
.hero h1{font-size:27px;line-height:1.22;font-weight:700;color:var(--deep);max-width:20ch}
.hero p.sub{margin-top:10px;color:var(--mut);font-size:15px;max-width:34ch}
.pricechip{display:inline-flex;align-items:center;gap:8px;background:var(--deep);color:#fff;border-radius:999px;padding:7px 14px;font-size:13.5px;font-weight:600;margin-top:14px}
.pricechip b{color:var(--gold);font-size:15px}
.cta{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--gold);color:var(--deep);font-weight:700;font-size:17px;border-radius:16px;padding:16px;margin-top:18px;box-shadow:0 8px 20px rgba(226,195,66,.35);transition:transform .12s}
.cta:active{transform:scale(.98)}
.cta.secondary{background:#fff;border:1.5px solid var(--line);color:var(--teal);box-shadow:none;font-weight:600}
.hero .fine{margin-top:12px;font-size:12px;color:var(--mut)}

.stepscard{margin-top:16px;display:grid;gap:10px}
.stepitem{display:flex;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;align-items:center}
.stepitem .n{width:34px;height:34px;flex:0 0 auto;border-radius:12px;background:#EAF4F6;color:var(--teal);font-weight:700;display:flex;align-items:center;justify-content:center}
.stepitem b{display:block;font-size:15px}
.stepitem small{color:var(--mut);font-size:13px}
.trust{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.trust span{background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:12px;color:var(--mut)}
.need{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px}
.need h3{font-size:14px;color:var(--teal);margin-bottom:8px}
.need li{list-style:none;padding:4px 0 4px 26px;position:relative;font-size:14px;color:var(--ink)}
.need li:before{content:"✓";position:absolute;left:2px;color:var(--ok);font-weight:700}
.demohint{margin-top:16px;background:#FFF9E3;border:1px dashed var(--gold);border-radius:14px;padding:12px 14px;font-size:13px;color:#6B5B13}
footer{margin-top:26px;padding:18px 4px 8px;border-top:1px solid var(--line);color:var(--mut);font-size:12px;line-height:1.6}
footer a{color:var(--teal)}

/* wizard */
.wiztop{display:flex;align-items:center;gap:12px;padding:4px 0 12px}
.backbtn{background:#fff;border:1px solid var(--line);border-radius:12px;width:38px;height:38px;font-size:17px;color:var(--teal);flex:0 0 auto}
.prog{flex:1}
.prog .lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--mut);margin-bottom:6px}
.prog .bar{height:6px;background:#E2EEF1;border-radius:99px;overflow:hidden}
.prog .fill{height:100%;background:linear-gradient(90deg,var(--cool),var(--teal));border-radius:99px;transition:width .3s}
h2.q{font-size:21px;font-weight:700;color:var(--deep);margin:8px 0 4px}
p.help{color:var(--mut);font-size:14px;margin-bottom:14px}
.fgroup{margin-bottom:14px}
label.f{display:block;font-size:13px;font-weight:600;color:var(--teal);margin-bottom:6px}
label.f em{font-style:normal;color:var(--mut);font-weight:400}
.tin,select.tin,textarea.tin{width:100%;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:13px 14px;outline:none;transition:border .15s}
.tin:focus{border-color:var(--cool)}
.tin.bad{border-color:var(--bad);background:#FFFBFB}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.err{color:var(--bad);font-size:12px;margin-top:4px;display:none}
.err.show{display:block}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:11px 14px;font-size:14px;color:var(--ink);transition:all .12s}
.chip.on{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:600}
.chip.big{width:100%;text-align:left;padding:14px 16px}
.chip.big small{display:block;font-size:12px;color:var(--mut);font-weight:400;margin-top:2px}
.chip.big.on small{color:#CFE7EC}
.whisper{background:#EAF4F6;border-radius:12px;padding:10px 12px;font-size:12.5px;color:var(--teal);margin-top:8px}
.navbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:linear-gradient(to top,var(--bg) 65%,rgba(244,249,250,0));padding:14px 20px calc(14px + env(safe-area-inset-bottom))}
.navbar .in{max-width:480px;margin:0 auto;display:flex;gap:10px}
.navbar .cta{margin-top:0}
.uploadbox{border:1.5px dashed var(--cool);background:#F2FAFB;border-radius:14px;padding:14px;text-align:center;font-size:14px;color:var(--teal);width:100%}
.filechip{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:13px;margin-top:8px}
.filechip img{width:44px;height:44px;object-fit:cover;border-radius:8px}
.filechip .x{margin-left:auto;color:var(--bad);background:none;font-size:16px}

/* camera */
.camwrap{background:#000;border-radius:20px;overflow:hidden;position:relative;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center}
.camwrap video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.camwrap img.shot{width:100%;height:100%;object-fit:cover}
.camwrap .guide{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center}
.camwrap .guide .oval{width:62%;height:52%;border:2.5px dashed rgba(255,255,255,.75);border-radius:50%}
.camwrap .hinttxt{position:absolute;bottom:12px;left:0;right:0;text-align:center;color:#fff;font-size:13px;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.camctl{display:flex;gap:10px;margin-top:12px}
.snap{width:100%;background:var(--teal);color:#fff;font-weight:700;font-size:16px;border-radius:16px;padding:15px}
.phototips{display:grid;gap:6px;margin:12px 0}
.phototips span{font-size:13px;color:var(--mut);padding-left:24px;position:relative}
.phototips span:before{content:"•";position:absolute;left:8px;color:var(--gold);font-weight:700}

/* review */
.sumcard{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:4px 16px;margin-bottom:12px}
.sumrow{display:flex;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid #EEF5F6;font-size:14px}
.sumrow:last-child{border-bottom:0}
.sumrow .k{color:var(--mut);flex:0 0 40%}
.sumrow .v{text-align:right;font-weight:500;overflow-wrap:anywhere}
.sumhead{display:flex;justify-content:space-between;align-items:center;padding:12px 0 6px}
.sumhead h3{font-size:14px;color:var(--teal)}
.sumhead button{background:none;color:var(--cool);font-size:13px;font-weight:600}
.consent{display:flex;gap:12px;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;font-size:13.5px;align-items:flex-start}
.consent input{width:20px;height:20px;margin-top:2px;accent-color:var(--teal);flex:0 0 auto}
.consent.bad{border-color:var(--bad)}

/* pay */
.ordercard{background:var(--deep);color:#fff;border-radius:20px;padding:20px;margin-bottom:14px}
.ordercard .l1{display:flex;justify-content:space-between;font-size:14.5px;padding:6px 0;color:#CFE7EC}
.ordercard .tot{display:flex;justify-content:space-between;font-weight:700;font-size:19px;border-top:1px solid rgba(255,255,255,.18);margin-top:8px;padding-top:12px}
.ordercard .tot b{color:var(--gold)}
.ordercard .note{font-size:12px;color:#9FC4CC;margin-top:10px}
.paycard{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px;position:relative}
.paycard .demobadge{position:absolute;top:-10px;right:14px;background:var(--gold);color:var(--deep);font-size:11px;font-weight:700;border-radius:999px;padding:4px 10px}
.paycard input{background:#F6FAFB}
.paycard input:disabled{color:var(--mut)}

/* done */
.bigcheck{width:86px;height:86px;border-radius:50%;background:var(--okbg);color:var(--ok);display:flex;align-items:center;justify-content:center;font-size:40px;margin:26px auto 14px;animation:pop .4s cubic-bezier(.2,1.4,.4,1) both}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.center{text-align:center}
.nextsteps{margin-top:18px;text-align:left}

/* doctor */
.dochead{background:var(--deep);margin:-20px -20px 16px;padding:16px 20px;display:flex;align-items:center;gap:10px;border-radius:0 0 22px 22px}
.dochead .wm{color:#fff;font-weight:700;font-size:17px}
.dochead .wm small{display:block;font-size:11.5px;color:#9FC4CC;font-weight:400}
.dochead .right{margin-left:auto;display:flex;gap:8px}
.dochead button{background:rgba(255,255,255,.12);color:#DCEFF3;font-size:12px;border-radius:10px;padding:7px 11px}
.qcard{display:flex;gap:14px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s}
.qcard:active{transform:scale(.99)}
.avatar{width:46px;height:46px;border-radius:14px;background:#EAF4F6;color:var(--teal);font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.qcard .mid{flex:1;min-width:0}
.qcard .nm{font-weight:600;font-size:15px;display:flex;gap:8px;align-items:center}
.qcard .meta{font-size:12.5px;color:var(--mut);margin-top:1px}
.pill{font-size:11.5px;font-weight:700;border-radius:999px;padding:5px 10px;white-space:nowrap}
.pill.ok{background:var(--okbg);color:var(--ok)}
.pill.bad{background:var(--badbg);color:var(--bad)}
.pill.done{background:#EAF4F6;color:var(--teal)}
.tagyou{background:var(--gold);color:var(--deep);font-size:10px;font-weight:700;border-radius:6px;padding:2px 6px}
.verdict{border-radius:20px;padding:18px;color:#fff;margin-bottom:14px;box-shadow:var(--shadow)}
.verdict.ok{background:linear-gradient(135deg,#1D9E58,#127A44)}
.verdict.bad{background:linear-gradient(135deg,#D05252,#B23434)}
.verdict .big{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
.verdict .sub{font-size:13px;opacity:.92;margin-top:4px}
.verdict .cnt{margin-left:auto;background:rgba(255,255,255,.2);border-radius:999px;padding:4px 11px;font-size:13px;font-weight:700}
.checks{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:6px 0;margin-bottom:14px}
.checkrow{display:flex;gap:12px;padding:11px 16px;border-bottom:1px solid #F0F6F7;align-items:flex-start}
.checkrow:last-child{border-bottom:0}
.ic{width:24px;height:24px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;margin-top:1px}
.ic.ok{background:var(--okbg);color:var(--ok)}
.ic.bad{background:var(--badbg);color:var(--bad)}
.checkrow b{font-size:13.5px;display:block}
.checkrow small{color:var(--mut);font-size:12.5px;line-height:1.45}
.dcard{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px}
.dcard h3{font-size:13px;color:var(--teal);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.dcard .thumb{width:100%;max-height:300px;object-fit:cover;border-radius:14px;cursor:zoom-in}
.aisum{background:#F2FAFB;border:1px solid #D5ECEF;border-radius:var(--r);padding:16px;margin-bottom:14px;font-size:14px}
.aisum h3{font-size:12px;color:var(--cool);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.aisum .foot{font-size:11.5px;color:var(--mut);margin-top:10px;border-top:1px solid #D5ECEF;padding-top:8px}
details.intake{background:#fff;border:1px solid var(--line);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
details.intake summary{padding:14px 16px;font-weight:600;font-size:14px;color:var(--teal);cursor:pointer;list-style:none;display:flex;justify-content:space-between}
details.intake summary:after{content:"▾";color:var(--mut)}
details.intake[open] summary:after{content:"▴"}
details.intake .body{padding:0 16px 12px}
.signbox{background:#fff;border:2px solid var(--gold);border-radius:20px;padding:18px;margin-bottom:14px}
.signbox h3{font-size:15px;margin-bottom:10px}
.rxprev{font-size:13.5px;color:var(--ink);background:#FBF9EE;border-radius:12px;padding:12px;margin-bottom:12px;line-height:1.6}
.signbtn{width:100%;background:var(--ok);color:#fff;font-weight:700;font-size:16px;border-radius:14px;padding:15px;margin-top:10px}
.signbtn:disabled{background:#B9CDD2;cursor:not-allowed}
.declinebtn{width:100%;background:var(--bad);color:#fff;font-weight:700;font-size:15px;border-radius:14px;padding:14px;margin-top:10px}
.ghostbtn{width:100%;background:none;color:var(--mut);font-size:13px;padding:10px;text-decoration:underline}
.signedbanner{background:var(--okbg);border:1px solid #BFE5CD;color:var(--ok);border-radius:14px;padding:14px;font-weight:600;font-size:14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.signedbanner a{color:var(--ok)}

/* rx doc */
.rxsheet{background:#fff;border:1px solid var(--line);border-radius:8px;padding:30px 26px;position:relative;overflow:hidden;box-shadow:var(--shadow);font-size:14px}
.rxsheet .lh{display:flex;align-items:center;gap:10px;border-bottom:2.5px solid var(--teal);padding-bottom:14px;margin-bottom:16px}
.rxsheet .lh .t{font-weight:700;color:var(--teal);font-size:19px}
.rxsheet .lh small{display:block;color:var(--mut);font-weight:400;font-size:11.5px}
.rxsheet .blk{margin-bottom:14px}
.rxsheet .blk h4{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin-bottom:4px}
.rxsheet .rxbody{border:1px solid var(--line);border-radius:10px;padding:14px;line-height:1.7}
.rxsheet .sig{margin-top:22px;display:flex;justify-content:space-between;align-items:flex-end;gap:12px}
.rxsheet .sig .name{font-family:'Caveat',cursive;font-size:30px;color:var(--deep);border-bottom:1.5px solid var(--ink);padding:0 10px 2px;min-width:180px}
.rxsheet .sig small{color:var(--mut);font-size:11px}
.watermark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.watermark span{transform:rotate(-24deg);font-size:44px;font-weight:800;color:rgba(196,61,61,.13);border:4px solid rgba(196,61,61,.13);border-radius:14px;padding:8px 22px;white-space:nowrap}

/* overlays */
.overlay{position:fixed;inset:0;background:rgba(1,39,51,.75);z-index:90;display:flex;align-items:center;justify-content:center;padding:20px}
.overlay img{max-width:100%;max-height:86dvh;border-radius:14px}
.modal{background:#fff;border-radius:20px;max-width:460px;width:100%;max-height:82dvh;overflow:auto;padding:22px}
.modal h3{color:var(--teal);margin-bottom:10px;font-size:17px}
.modal .crit{padding:9px 0;border-bottom:1px solid #EEF5F6;font-size:13.5px}
.modal .crit b{color:var(--deep)}
.modal .close{width:100%;margin-top:14px;background:var(--teal);color:#fff;border-radius:12px;padding:12px;font-weight:600}
.toast{position:fixed;bottom:calc(100px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--deep);color:#fff;font-size:13.5px;border-radius:12px;padding:11px 18px;z-index:95;box-shadow:var(--shadow);max-width:90vw;text-align:center}

@media print{
  .ribbon,.noprint,.navbar{display:none!important}
  body{background:#fff}
  .shell{padding:0;max-width:none}
  .rxsheet{border:0;box-shadow:none}
}
/* report scan + extraction tags */
.frtag{font-style:normal;color:var(--ok);background:var(--okbg);font-weight:600;font-size:10.5px;border-radius:6px;padding:2px 6px;margin-left:6px;vertical-align:1px}
.scanbox{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:24px 20px;min-height:220px}
.scanline{opacity:0;animation:fadeUp .4s ease forwards;font-size:14.5px;padding:7px 0}
.scanline:first-child{font-weight:600;color:var(--teal)}

/* queue sections + completed examples */
.learnnote{background:#F2FAFB;border:1px solid #D5ECEF;border-radius:14px;padding:12px 14px;font-size:13px;color:var(--ink);margin-bottom:14px;line-height:1.5}
.seclabel{font-size:12px;font-weight:700;color:var(--mut);letter-spacing:.06em;text-transform:uppercase;margin:18px 0 8px}
.seclabel small{font-weight:400;text-transform:none;letter-spacing:0}
.qlist{display:grid;gap:10px;grid-template-columns:1fr}
.qlist .qcard{margin-bottom:0}
.pill.decl{background:#F0F3F4;color:#5E7A83}
.signedbanner.decl{background:#F6F7F8;border-color:#DCE4E7;color:#4A6A74}
.docback{background:rgba(255,255,255,.14);color:#fff;border-radius:12px;width:36px;height:36px;font-size:19px;flex:0 0 auto}

/* ===== desktop layout (≥900px) — real desktop UI, company default for all Orma sites ===== */
@media (min-width:900px){
  .shell{max-width:1060px;padding:28px 48px 70px}
  .shell.narrow{max-width:660px;padding:28px 24px 40px}
  .shell.wide{max-width:1200px}
  .navbar{position:static;background:none;padding:6px 0 34px}
  .navbar .in{max-width:660px;margin:0 auto;justify-content:flex-end;padding:0 24px}
  .navbar .cta{width:auto;min-width:240px}
  .brand{padding:10px 0 8px}
  .brand .wm{font-size:24px}
  .hero{padding:54px 56px;border-radius:30px}
  .hero h1{font-size:44px;max-width:19ch}
  .hero p.sub{font-size:17px;max-width:52ch}
  .hero .ringbg{width:300px;height:300px;right:-70px;top:-70px;opacity:.35}
  .hero .cta{width:auto;padding:16px 38px}
  .stepscard{grid-template-columns:repeat(3,1fr);gap:14px;margin-top:20px}
  .stepitem{flex-direction:column;align-items:flex-start;gap:10px;padding:22px 20px}
  .landrow{display:grid;grid-template-columns:1.35fr 1fr;gap:14px;align-items:stretch}

/* ============ criteria engine v0.1 (physician-approved ruleset pending — see ruleset modal) ============ */
const QUALIFIERS_SYM=["Daytime sleepiness","Trouble concentrating","Low mood","Trouble sleeping (insomnia)"];
const QUALIFIERS_CON=["High blood pressure","Heart disease (ischemic)","Stroke history"];
function evaluate(c){
  const checks=[];const age=ageFromDOB(c.dob);const ahi=parseFloat(c.ahi);
  const sAge=studyAgeMonths(c.sMonth,c.sYear);
  const push=(id,label,pass,evidence)=>checks.push({id,label,pass,evidence});
  push("C1","Adult (18+)",age!==null&&age>=18,age!==null?`Age ${age} from date of birth on file.`:"Date of birth missing.");
  const idOk=!!(c.first&&c.last&&c.dob&&c.sex&&c.state&&c.email);
  push("C2","Identity & state complete",idOk,idOk?`${esc(c.first)} ${esc(c.last)}, ${esc(c.sex)}, ${esc(c.state)} — contact on file.`:"Missing identity or contact fields.");
  const studyOk=!!(c.sType&&c.sYear&&!isNaN(ahi)&&(c.dxed==="Yes"||c.dxed==="Not sure"));
  push("C3","Sleep study documented",studyOk,studyOk?`${c.sType}, ${MONTHS[c.sMonth]} ${c.sYear} — AHI ${ahi} events/hr reported${c.report?`; report attached (${esc(c.report.name)})`:"; no report file attached"}.`:"Study type, date, or AHI missing.");
  const recOk=sAge!==null&&sAge<=60;
  push("C4","Study within 5 years",recOk,sAge===null?"Study date missing.":`Study is ${sAge<1?"less than a month":sAge+" months"} old${recOk?" — within the 5-year window. Note: some payers/DME require testing within 12 months.":" — outside the 5-year window; repeat testing typically required."}`);
  let sevOk=false,sevEv="";
  if(!isNaN(ahi)){
    if(ahi>=15){sevOk=true;sevEv=`AHI ${ahi} ≥ 15 — meets the primary threshold (${ahi>=30?"severe":"moderate"} range).`;}
    else if(ahi>=5){const q=[...c.symptoms.filter(s=>QUALIFIERS_SYM.includes(s)),...c.conds.filter(s=>QUALIFIERS_CON.includes(s))];
      sevOk=q.length>0;sevEv=sevOk?`AHI ${ahi} (5–14.9, mild) WITH qualifier(s): ${q.join(", ")} — meets the mild-plus-qualifier rule.`:`AHI ${ahi} (5–14.9) with no reported qualifying symptom or comorbidity.`;}
    else{sevEv=`AHI ${ahi} < 5 — below the prescribing threshold.`;}
  } else sevEv="AHI not provided.";
  push("C5","OSA severity threshold",sevOk,sevEv);
  let obsOk=true,obsEv="";
  const csaRisk=c.conds.includes("Heart failure")||c.opioids==="Yes";
  if(c.pattern==="Mostly central"){obsOk=false;obsEv="Study reported as predominantly CENTRAL apnea — CPAP may be inappropriate; consider BiPAP-ST/ASV work-up.";}
  else if(c.pattern==="Mostly obstructive"){obsEv="Study reported as predominantly obstructive."+(csaRisk?" CSA risk factors present ("+(c.conds.includes("Heart failure")?"heart failure":"")+(c.conds.includes("Heart failure")&&c.opioids==="Yes"?" + ":"")+(c.opioids==="Yes"?"daily opioids":"")+") — flagged for physician attention.":"");}
  else{if(csaRisk){obsOk=false;obsEv="Apnea type unknown AND central-apnea risk factors present ("+[c.conds.includes("Heart failure")?"heart failure":null,c.opioids==="Yes"?"daily opioid use":null].filter(Boolean).join(", ")+") — physician evaluation needed before auto-CPAP.";}
   else obsEv="Patient unsure of apnea type; no central-apnea risk factors reported.";}
  push("C6","Obstructive predominance",obsOk,obsEv);
  const safList=(c.safety||[]).filter(x=>x!=="None of these");
  const safOk=safList.length===0;
  push("C7","No structural/safety red flags",safOk,safOk?"None of the screened red flags reported (recent facial surgery/injury, CSF leak or skull surgery, recent pneumothorax, severe nosebleeds).":"Reported: "+safList.join("; ")+" — needs physician evaluation before PAP.");
  push("C8","Airway exam evidence (photo)",!!c.photo,c.photo?(c.photoKind==="sample"?"Sample oropharynx photo on file (demo). Physician-viewed only — never machine-analyzed.":"Self-captured oropharynx photo on file. Physician-viewed only — never machine-analyzed."):"No airway photo captured.");
  push("C9","Consents & attestation",!!(c.cTele&&c.cTruth),(c.cTele&&c.cTruth)?"Telehealth consent + truthful-information attestation checked.":"Consent or attestation missing.");
  const passed=checks.filter(x=>x.pass).length;
  return {green:passed===checks.length,passed,total:checks.length,checks};
}
function bmi(c){const h=(parseInt(c.hFt)||0)*12+(parseInt(c.hIn)||0);const w=parseFloat(c.wLb);if(!h||!w)return null;return Math.round(w*703/(h*h)*10)/10;}
function aiSummary(c,v){const age=ageFromDOB(c.dob);const ahi=parseFloat(c.ahi);const sev=isNaN(ahi)?"unquantified":ahi>=30?"severe":ahi>=15?"moderate":ahi>=5?"mild":"sub-threshold";
  const b=bmi(c);let s=`${age}-year-old ${c.sex?c.sex.toLowerCase():"patient"} in ${c.state} with ${sev} OSA by report (AHI ${isNaN(ahi)?"—":ahi}, ${c.sType?c.sType.toLowerCase():"study"}, ${MONTHS[c.sMonth]||""} ${c.sYear||""}${b?`; BMI ${b}`:""}). `;
  if(c.symptoms.length)s+=`Reports ${c.symptoms.map(x=>x.toLowerCase()).join(", ")}. `;
  if(c.conds.length&&!c.conds.includes("None of these"))s+=`History: ${c.conds.map(x=>x.toLowerCase()).join(", ")}${c.opioids==="Yes"?", daily opioid use":""}. `;
  else if(c.opioids==="Yes")s+=`Daily opioid use reported. `;
  const fails=v.checks.filter(x=>!x.pass);
  s+=fails.length?`Pre-review: ${v.passed}/${v.total} checks — attention needed on ${fails.map(f=>f.label.toLowerCase()).join("; ")}.`:`Pre-review: all ${v.total} checks met; queue-ready for signature.`;
  return s;}

function downscale(file,maxDim,q,cb){const img=new Image();img.onload=()=>{const sc=Math.min(1,maxDim/Math.max(img.width,img.height));
 const cv=document.createElement("canvas");cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);
 cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);cb(cv.toDataURL("image/jpeg",q));URL.revokeObjectURL(img.src);};
 img.src=URL.createObjectURL(file);}

  ?`<div class="signedbanner decl"><span>✕ Not prescribed — note sent & $50 refunded${d.name?" · "+esc(d.name):""} · ${new Date(d.ts).toLocaleDateString()}</span></div>
    <div class="dcard"><h3>Note sent to patient</h3><div style="font-size:13.5px;line-height:1.6;white-space:pre-wrap">${esc(d.note||"")}</div></div>`
  :v.green?signBox(id,c,false):redActions(id,c,fails);
 app.innerHTML=`<div class="shell wide view">
  <div class="dochead noprint"><button class="docback" onclick="nav('#/doctor')" aria-label="Back to patient list">‹</button>${oring(26)}<div class="wm">${esc(c.first)} ${esc(c.last)}<small>${ageFromDOB(c.dob)}-year-old ${esc((c.sex||"").toLowerCase())} · ${esc(c.state)} · submitted ${agoStr(c.ts)}</small></div>
   <div class="right"><button onclick="nav('#/doctor')">‹ Patient list</button></div></div>
  <div class="casegrid">
  <div class="colmain">
  <div class="verdict ${v.green?"ok":"bad"}">
   <div class="big">${v.green?"✅ Meets CPAP prescription criteria":"⚠️ Does not meet criteria"}<span class="cnt">${v.passed}/${v.total}</span></div>
   <div class="sub">${v.green?"All checks passed — review the evidence below and sign.":fails.length+" check"+(fails.length>1?"s":"")+" failed: "+fails.map(f=>f.label).join(" · ")}</div>
  </div>

  <div class="aisum"><h3>AI pre-review summary</h3>${esc(aiSummary(c,v))}
   <div class="foot">Automated pre-review against ruleset v0.1 (<a href="javascript:showRuleset()">view</a>). It checks completeness and criteria only — the prescribing decision is yours. The airway photo is never machine-analyzed.</div></div>

  <div class="checks">${v.checks.map(k=>`<div class="checkrow"><div class="ic ${k.pass?"ok":"bad"}">${k.pass?"✓":"✕"}</div><div><b>${k.label}</b><small>${k.evidence}</small></div></div>`).join("")}</div>
  </div>

  <div class="colside">
  <div class="row2" style="align-items:start">
   <div class="dcard"><h3>Airway photo</h3>${photoHtml(c)}</div>
   <div class="dcard"><h3>Sleep study</h3>
    <div style="font-size:14px;line-height:1.7">${esc(c.sType)}<br>${MONTHS[c.sMonth]||""} ${c.sYear||""} · AHI <b>${esc(c.ahi)}</b><br>Pattern: ${esc(c.pattern||"—")}<br>
    ${c.report?`📄 ${esc(c.report.name)}${c.report.kind==="img"&&c.report.thumb?`<br><img class="thumb" style="margin-top:8px" src="${c.report.thumb}" onclick="zoomImg('${c.report.thumb}')">`:""}`:"<span style='color:var(--mut)'>No report file attached</span>"}</div></div>
  </div>

  <details class="intake"><summary>Full intake — every answer</summary><div class="body">
   ${[["DOB",c.dob],["Email",c.email],["Phone",c.phone||"—"],["Address",c.address||"—"],["Height",c.hFt&&c.hIn?c.hFt+"′"+c.hIn+"″":"—"],["Weight",c.wLb?c.wLb+" lb":"—"],["BMI",b||"—"],["Symptoms",c.symptoms.join(", ")||"none"],["Conditions",c.conds.join(", ")||"none"],["Daily opioids",c.opioids||"—"],["Safety flags",(c.safety||[]).filter(x=>x!=="None of these").join("; ")||"none"],["Meds / allergies",c.meds||"—"],["Told has sleep apnea",c.dxed||"—"],["Telehealth consent",c.cTele?"✓":"✗"],["Truthfulness attestation",c.cTruth?"✓":"✗"]].map(r=>`<div class="sumrow"><span class="k">${esc(r[0])}</span><span class="v">${esc(String(r[1]))}</span></div>`).join("")}
  </div></details>
  </div>

  <div class="actionarea">${action}
  <button class="ghostbtn noprint" onclick="nav('#/doctor')">‹ Back to patient list</button></div>
  </div>
 </div>`;
}
function rxDefaults(c){return {device:"APAP (auto-adjusting positive airway pressure)",pressure:"4–20 cm H₂O",humid:"Heated humidifier",supplies:"Mask and headgear of patient’s choice with fitting; tubing and filters; replacement supplies per standard schedule",dx:"G47.33 — Obstructive sleep apnea",lon:"99 months (lifetime need)"};}
function signBox(id,c,isOverride){
 const rx=rxDefaults(c);
 return `<div class="signbox" id="signbox">
  <h3>${isOverride?"Sign with documented rationale":"Prescription — review & sign"}</h3>
  ${isOverride?`<div class="fgroup"><label class="f">Clinical rationale (required)</label><textarea class="tin" id="ovr" rows="2" placeholder="Why prescribing despite failed checks…"></textarea></div>`:""}
  <div class="rxprev" id="rxprev"><b>Rx:</b> <span id="rxdevice">${rx.device}</span>, <span id="rxpressure">${rx.pressure}</span> · ${rx.humid} · ${rx.supplies}<br><b>Dx:</b> ${rx.dx} · <b>Length of need:</b> ${rx.lon}</div>
  <div class="row2">
   <button class="chip" onclick="setRx('APAP (auto-adjusting positive airway pressure)','4–20 cm H₂O',this)">APAP 4–20</button>
   <button class="chip" onclick="setRx('CPAP (fixed pressure)','10 cm H₂O',this)">Fixed CPAP 10</button>
  </div>
  <div class="fgroup" style="margin-top:12px"><label class="consent" style="margin:0"><input type="checkbox" id="att" onchange="$('#dosign').disabled=!(this.checked&&$('#signname').value.trim())"><span>I have reviewed the intake, sleep-study details, and airway photo, and I am licensed in the patient’s state.</span></label></div>
  <div class="fgroup"><label class="f">Type your full name to sign</label><input class="tin" id="signname" placeholder="Dr. …" oninput="$('#dosign').disabled=!(this.value.trim()&&$('#att').checked)"></div>
  <button class="signbtn" id="dosign" disabled onclick="doSign('${id}',${isOverride?1:0})">✍️ Sign & issue prescription</button>
 </div>`;
}
function setRx(dev,pres,btn){$("#rxdevice").textContent=dev;$("#rxpressure").textContent=pres;btn.closest(".row2").querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));btn.classList.add("on");}
function redActions(id,c,fails){
 const note="Thank you for your Orma Rx request. I can’t issue a CPAP prescription yet because:\n"+fails.map(f=>"• "+f.label+" — "+f.evidence.replace(/<[^>]+>/g,"")).join("\n")+"\n\nYour $50 has been refunded in full. What to do next: please discuss these findings with a physician — in many cases an in-person or video evaluation resolves them.";
 return `<div class="dcard" id="redactions"><h3>Decision</h3>
  <div class="fgroup"><label class="f">Note to patient (prefilled from the failed checks — edit freely)</label>
  <textarea class="tin" id="declinenote" rows="7">${esc(note)}</textarea></div>
  <button class="declinebtn" onclick="doDecline('${id}')">Send note & refund $50 (demo)</button>
  <button class="ghostbtn" onclick="overrideSign('${id}')">Sign anyway — document clinical rationale</button>
 </div>`;
}
function doDecline(id){
 const note=$("#declinenote")?$("#declinenote").value.trim():"";
 const d=store.declined;d[id]={ts:Date.now(),note};store.declined=d;
 toast("Demo: note sent to patient + $50 refund issued");nav("#/doctor");
}
function overrideSign(id){const c=getCase(id);const el=$("#redactions");if(el&&c)el.outerHTML=signBox(id,c,true);}
function doSign(id,isOverride){
 const name=$("#signname").value.trim();if(!name)return;
 if(isOverride){const r=$("#ovr");if(r&&!r.value.trim()){toast("Rationale required to sign a red case");return;}}
 const signed=store.signed;
 signed[id]={name,ts:Date.now(),device:$("#rxdevice").textContent,pressure:$("#rxpressure").textContent,override:!!isOverride,rationale:isOverride&&$("#ovr")?$("#ovr").value.trim():""};
 store.signed=signed;toast("Prescription signed");nav("#/rx/"+id);
}

/* rx doc */
function vRx(id){
 const c=getCase(id);const s=c?caseStatus(c).s:null;if(!c||!s)return nav("#/doctor");
 const rx=rxDefaults(c);
 app.innerHTML=`<div class="shell narrow view">
  <div class="noprint" style="display:flex;gap:10px;margin-bottom:14px">
   <button class="backbtn" onclick="nav('#/doctor/${id}')">‹</button>
   <button class="cta" style="margin:0;flex:1" onclick="window.print()">🖨 Print / save as PDF</button>
  </div>
  <div class="rxsheet">
   <div class="watermark"><span>SPECIMEN · TEST BUILD</span></div>
   <div class="lh">${oring(34)}<div class="t">Orma Rx<small>Prescription — Positive Airway Pressure Therapy · ${new Date(s.ts).toLocaleDateString()}</small></div></div>
   <div class="blk"><h4>Patient</h4>${esc(c.first)} ${esc(c.last)} · DOB ${esc(c.dob)} · ${c.address?esc(c.address)+", ":""}${esc(c.state)}</div>
   <div class="blk"><h4>Diagnosis</h4>${rx.dx}</div>
   <div class="blk"><h4>Prescription</h4><div class="rxbody">
    <b>${esc(s.device)}</b>, pressure ${esc(s.pressure)}<br>${rx.humid}<br>${rx.supplies}<br>Length of need: ${rx.lon} · Valid at the supplier of patient’s choice
   </div></div>
   ${s.override?`<div class="blk"><h4>Clinical rationale (override)</h4>${esc(s.rationale)}</div>`:""}
   <div class="sig"><div><div class="name">${esc(s.name)}</div><small>Reviewing physician · License on file (demo) · Signed electronically ${new Date(s.ts).toLocaleString()}</small></div></div>
  </div>
  <div class="noprint" style="font-size:12px;color:var(--mut);margin-top:12px;text-align:center">Test build — this specimen is not a valid prescription.</div>
 </div>`;
}

/* wizard dispatch */
function vWizard(step){switch(step){case 1:step1();break;case 2:step2();break;case 3:step3();break;case 4:step4();break;case 5:step5();break;default:step1();}}

render();
</script>
</body>
</html>
